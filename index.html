<!doctype html>
<html>
  <head>
    <title>Test Site</title>
  </head>
  <body>
    <h1 id="title"></h1>
    <p id="content"></p>

    <script>
      fetch("/index.md")
        .then((res) => res.text())
        .then((text) => {
          document.getElementById("content").innerText = text;
        });
    </script>
  </body>
</html>
