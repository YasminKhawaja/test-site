<script>
  fetch("/index.md")
    .then((res) => res.text())
    .then((text) => {
      // verwijder frontmatter (--- blok)
      const content = text.split("---")[2];

      // simpele markdown → html
      const html = content
        .replace(/\n/g, "<br>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

      document.body.innerHTML = html;
    });
</script>
